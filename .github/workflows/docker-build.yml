name: Docker Build & Push

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - activitypub-water
  workflow_run:
    workflows: ["linter", "run-tests"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the Docker image'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            herrlevin/reisetagebuch
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine app version
        id: app_version
        run: |
          # If this is a semver tag (v...), use the metadata action's version and tags
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tags=${{ steps.meta.outputs.tags }}" >> "$GITHUB_OUTPUT"
          # If this is the special activitypub-water branch, force the docker tag to 'activitypub-water'
          elif [[ "${{ github.ref }}" == refs/heads/activitypub-water ]]; then
            # Use fully qualified repository name so Docker pushes to the correct repo
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "tags=herrlevin/reisetagebuch:activitypub-water" >> "$GITHUB_OUTPUT"
          else
            # Default: use commit SHA as version and propagate metadata tags
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "tags=${{ steps.meta.outputs.tags }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # Prefer tags computed by the previous step (which may force 'activitypub-water'),
          # fall back to metadata tags or 'latest'
          tags: ${{ steps.app_version.outputs.tags || steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.version }}
